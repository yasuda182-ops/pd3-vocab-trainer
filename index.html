let vocab=[],filtered=[],current=0,answerHidden=true;
async function inflate(b64){const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));return await new Response(stream).text()}
function escapeHtml(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function blurJapaneseParts(text){return escapeHtml(text).replace(/([\u3040-\u30ff\u3400-\u9fff\u3000-\u303f\uff00-\uffef〜ー・、。！？「」『』（）]+)/g,m=>`<span class="${answerHidden?"jp-blur":"jp-visible"}">${m}</span>`).replaceAll("\n","<br>")}
function setHtml(id,text){document.getElementById(id).innerHTML=blurJapaneseParts(text)}
function setupPos(){const sel=document.getElementById("posFilter");[...new Set(vocab.map(v=>v.pos).filter(Boolean))].sort().forEach(p=>{const opt=document.createElement("option");opt.value=p;opt.textContent=p;sel.appendChild(opt)})}
function applyFilter(){const q=document.getElementById("search").value.toLowerCase(),pos=document.getElementById("posFilter").value;filtered=vocab.filter(v=>{const target=`${v.word} ${v.meaning} ${v.memo}`.toLowerCase();return(!q||target.includes(q))&&(!pos||v.pos===pos)});current=0;render()}
function render(){if(!filtered.length){document.getElementById("meta").innerHTML='<span class="badge">0 words</span>';document.getElementById("word").innerText="該当なし";document.getElementById("meaning").innerText="";document.getElementById("example").innerText="";return}const v=filtered[current],mode=document.getElementById("mode").value;document.getElementById("meta").innerHTML=`<span class="badge">${current+1} / ${filtered.length}</span><span class="badge">${v.pos||"-"}</span><span class="badge">${v.form||"-"}</span>`;if(mode==="ja-da"){setHtml("word",v.meaning||"意味なし");document.getElementById("meaning").innerText=v.word}else{document.getElementById("word").innerText=v.word;document.getElementById("meaning").innerText=v.meaning||"意味なし"}const meaningEl=document.getElementById("meaning");meaningEl.classList.remove("answer-hidden","answer-visible");meaningEl.classList.add(answerHidden?"answer-hidden":"answer-visible");setHtml("example",v.memo||"Memoなし")}
function prevWord(){if(filtered.length){current=(current-1+filtered.length)%filtered.length;render()}}function nextWord(){if(filtered.length){current=(current+1)%filtered.length;render()}}function shuffleWord(){if(filtered.length){current=Math.floor(Math.random()*filtered.length);render()}}function toggleAnswer(){answerHidden=!answerHidden;render()}function speak(){if(!filtered.length)return;const utter=new SpeechSynthesisUtterance(filtered[current].word);utter.lang="da-DK";utter.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(utter)}
inflate(vocabData).then(text=>{vocab=JSON.parse(text).map(([word,form,pos,meaning,memo])=>({word,form,pos,meaning,memo,example:memo}));filtered=[...vocab];setupPos();render()}).catch(err=>{document.getElementById("word").innerText="読み込みエラー";document.getElementById("example").innerText=String(err)})
</script>
