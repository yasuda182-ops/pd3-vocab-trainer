<html lang="ja">

<style>

h1 { font-size:34px; margin-bottom:4px; }
.sub { color:#6b7280; font-size:18px; margin-bottom:18px; }

  background:white;
  border-radius:24px;
  padding:36px;
  margin-top:20px;

.meta {
  color:#6b7280;

.badge {

.word {

  font-weight:800;

.meaning {

  border-radius:16px;

  white-space:pre-wrap;
}
.answer-hidden {
  filter: blur(10px);

}
.answer-visible {
  filter: none;
  user-select: auto;
}
.example-title {
  font-size:18px;
  color:#6b7280;
  margin:22px 0 8px;
  font-weight:700;
}
.example {
  background:#e9edff;
  padding:22px 24px;
  border-radius:16px;
  font-size:23px;

  white-space:pre-wrap;
}
.jp-blur {
  filter: blur(8px);
  user-select: none;
  transition: filter .15s ease;
}
.jp-visible {
  filter: none;
  user-select: auto;
}
.quiz {
  margin-top:24px;
  background:#fffdf8;
  border:1px solid #e2ded6;
  border-radius:20px;
  padding:24px;
}
.quiz h2 {
  margin:0 0 14px;
  font-size:24px;
}
.quiz-question {
  background:#f8fafc;
  padding:18px;
  border-radius:14px;
  font-size:22px;
  line-height:1.55;
  white-space:pre-wrap;
}
.options {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:12px;
  margin-top:16px;
}
.option {
  border:2px solid #d6d3cc;
  border-radius:14px;
  padding:14px 16px;
  font-size:20px;
  background:#fff;

  border-color:#0f766e;
  background:#dff6f0;
}
.option.wrong {
  border-color:#b91c1c;
  background:#fee2e2;
}
.quiz-answer {
  margin-top:16px;
  background:#ecfdf5;
  border-left:5px solid #0f766e;
  padding:16px 18px;
  border-radius:12px;
  font-size:20px;
  line-height:1.5;
  display:none;
  white-space:pre-wrap;

  border:2px solid #0f766e;

  font-size:20px;

  background:#0f766e;
  color:white;

.small {
  font-size:15px;
  color:#6b7280;
  margin-top:14px;

  <button onclick="prevWord()">前の単語</button>

let filtered = [...vocab];
let current = 0;
let answerHidden = true;

function escapeHtml(s) {
  return String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function blurJapaneseParts(text) {
  const escaped = escapeHtml(text);
  return escaped.replace(/([\u3040-\u30ff\u3400-\u9fff\u3000-\u303f\uff00-\uffef〜ー・、。！？「」『』（）]+)/g, function(match) {
    return `<span class="${answerHidden ? "jp-blur" : "jp-visible"}">${match}</span>`;
  }).replaceAll("\n", "<br>");
}

function setHtml(id, text) {
  document.getElementById(id).innerHTML = blurJapaneseParts(text);
}

function setupPos() {
  const posSet = [...new Set(vocab.map(v => v.pos).filter(Boolean))].sort();
  const sel = document.getElementById("posFilter");
  posSet.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });
}

function applyFilter() {
  const q = document.getElementById("search").value.toLowerCase();
  const pos = document.getElementById("posFilter").value;
  filtered = vocab.filter(v => {
    const target = `${v.word} ${v.meaning} ${v.memo} ${v.example}`.toLowerCase();
    return (!q || target.includes(q)) && (!pos || v.pos === pos);
  });
  current = 0;
  render();
}

function renderQuiz(v) {
  document.getElementById("quizQuestion").innerText = v.quiz.question;
  const box = document.getElementById("quizOptions");
  box.innerHTML = "";
  v.quiz.options.forEach(opt => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt;
    div.onclick = () => {
      [...document.querySelectorAll(".option")].forEach(o => o.classList.remove("correct", "wrong"));
      div.classList.add(opt === v.quiz.answer ? "correct" : "wrong");
      if (opt !== v.quiz.answer) {
        [...document.querySelectorAll(".option")].forEach(o => {
          if (o.innerText === v.quiz.answer) o.classList.add("correct");
        });
      }
    };
    box.appendChild(div);
  });
  const ans = document.getElementById("quizAnswer");
  ans.style.display = "none";
  ans.innerText =
    `正解: ${v.quiz.answer}\n` +
    `完成文: ${v.quiz.model_sentence}\n` +
    `意味: ${v.quiz.answer_jp}\n\n` +
    v.quiz.explanation;
}

function showQuizAnswer() {
  document.getElementById("quizAnswer").style.display = "block";
}

function render() {
  if (filtered.length === 0) {
    document.getElementById("meta").innerHTML = '<span class="badge">0 words</span>';
    document.getElementById("word").innerText = "該当なし";
    document.getElementById("meaning").innerText = "";
    document.getElementById("example").innerText = "";
    document.getElementById("quizQuestion").innerText = "";
    document.getElementById("quizOptions").innerHTML = "";
    document.getElementById("quizAnswer").innerText = "";
    return;
  }
  const v = filtered[current];
  const mode = document.getElementById("mode").value;
  document.getElementById("meta").innerHTML =
    `<span class="badge">${current+1} / ${filtered.length}</span>` +
    `<span class="badge">${v.pos || "-"}</span>` +
    `<span class="badge">${v.form || "-"}</span>`;

  if (mode === "ja-da") {
    setHtml("word", v.meaning || "意味なし");
    document.getElementById("meaning").innerText = v.word;
  } else {
    document.getElementById("word").innerText = v.word;
    document.getElementById("meaning").innerText = v.meaning || "意味なし";
  }

  const meaningEl = document.getElementById("meaning");
  meaningEl.classList.remove("answer-hidden", "answer-visible");
  meaningEl.classList.add(answerHidden ? "answer-hidden" : "answer-visible");

  setHtml("example", v.example || "");
  renderQuiz(v);
}

function prevWord() {
  if (filtered.length === 0) return;
  current = (current - 1 + filtered.length) % filtered.length;
  render();
}

function nextWord() {
  if (filtered.length === 0) return;
  current = (current + 1) % filtered.length;
  render();
}

function shuffleWord() {
  if (filtered.length === 0) return;
  current = Math.floor(Math.random() * filtered.length);
  render();
}

function toggleAnswer() {
  answerHidden = !answerHidden;
  render();
}

function speak() {
  if (filtered.length === 0) return;
  const utter = new SpeechSynthesisUtterance(filtered[current].word);
  utter.lang = "da-DK";
  utter.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

setupPos();
render();
</script>
